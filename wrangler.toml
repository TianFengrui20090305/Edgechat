# 这里的 name 建议改为 edgechat，以匹配 Pages 项目名
name = "edgechat"
main = "worker/src/index.js"
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]

[vars]
ADMIN_USERNAMES = "admin"
MESSAGE_RETENTION_DAYS = "7"
ALLOWED_FILE_TYPES = "image/,video/,application/pdf,text/"
MAX_FILE_SIZE = "20971520"

[[d1_databases]]
binding = "DB"
database_name = "cfchat-db"
database_id = "32462365-18b0-4c19-9a0f-5b212c303c13"

[[kv_namespaces]]
binding = "SESSIONS"
id = "177be40e8bf24f6da0ab510c04ec61fc"

[[r2_buckets]]
binding = "FILES"
bucket_name = "cfchat-files"

[[durable_objects.bindings]]
name = "CHANNEL_ROOM"
class_name = "ChannelRoom"

[[durable_objects.bindings]]
name = "SCHEDULER"
class_name = "Scheduler"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChannelRoom", "Scheduler"]

[assets]
directory = "./frontend/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/files/*"]

[triggers]
crons = ["0 19 * * *"]
